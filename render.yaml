services:
  # Backend API
  - type: web
    name: smarttourist-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://smarttourist-frontend.onrender.com
    healthCheckPath: /api/health

  # Frontend
  - type: web
    name: smarttourist-frontend
    env: static
    buildCommand: npm install && npm run build:client && cp public/_redirects dist/_redirects
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://smarttourist-backend.onrender.com/api
      - key: NODE_VERSION
        value: 20
