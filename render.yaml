services:
  # Backend API
  - type: web
    name: smarttourist-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install --prefix backend
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
    healthCheckPath: /api/health

  # Frontend
  - type: web
    name: smarttourist-frontend
    env: static
    buildCommand: npm install && npm run build:client
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://smarttourist-backend.onrender.com
      - key: NODE_VERSION
        value: 20
